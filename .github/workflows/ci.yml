name: Continuous Integration

on:
  push:

  pull_request:
    branches: ['main']

permissions:
  contents: read

jobs:
  build_and_test:
    name: 'Build & Test'

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['22', '24', '26']

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm test
        env:
          CI: true
      - run: pnpm run lint
      # The lint scripts run in fix mode; fail if they changed anything
      - run: git diff --exit-code

  consumer_test:
    name: 'Consumer smoke test'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Use Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.18.0'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      # Installs the packed tarball in a fresh npm project with the TypeScript 7
      # side-by-side aliases and floating peer versions, then lints through the
      # real oxlint binary. Catches packaging, peer-resolution, and
      # plugin-loading regressions that in-repo tests cannot see.
      - run: ./scripts/consumer-smoke-test.sh
